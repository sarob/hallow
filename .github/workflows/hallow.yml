name: Hallow Analysis

on:
  pull_request:
  push:
    branches: [main]

jobs:
  hallow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install hallow
        run: pip install hallow

      - name: Run hallow check
        run: hallow check --format github --ci
